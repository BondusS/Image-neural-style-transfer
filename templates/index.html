<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Style Transfer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Neural Style Transfer</h1>
        
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-body">
                        <form action="/transfer" method="post" enctype="multipart/form-data">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="content_image" class="form-label">Content Image</label>
                                        <input type="file" class="form-control" id="content_image" name="content_image" accept="image/*" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="style_image" class="form-label">Style Image</label>
                                        <input type="file" class="form-control" id="style_image" name="style_image" accept="image/*" required>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="steps" class="form-label">Steps (10-1000)</label>
                                        <input type="number" class="form-control" id="steps" name="steps" 
                                               min="10" max="1000" value="200">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="style_strength" class="form-label">Style Strength (0.0-1.0)</label>
                                        <input type="number" class="form-control" id="style_strength" name="style_strength" 
                                               min="0.0" max="1.0" step="0.1" value="1.0">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="text-center">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-magic"></i> Apply Style Transfer
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        {% if result_image %}
        <div class="row mt-5">
            <div class="col-12">
                <h2 class="text-center mb-4">Result</h2>
                <div class="card shadow result-card">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4 text-center">
                                <h4>Content Image</h4>
                                <img src="{{ original_content }}" alt="Content Image" class="img-fluid rounded">
                            </div>
                            <div class="col-md-4 text-center">
                                <h4>Style Image</h4>
                                <img src="{{ original_style }}" alt="Style Image" class="img-fluid rounded">
                            </div>
                            <div class="col-md-4 text-center">
                                <h4>Result</h4>
                                <img src="{{ result_image }}" alt="Styled Result" class="img-fluid rounded">
                            </div>
                        </div>
                        <div class="text-center mt-3">
                            <a href="{{ result_image }}" class="btn btn-success" download>
                                <i class="bi bi-download"></i> Download Result
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {% endif %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
