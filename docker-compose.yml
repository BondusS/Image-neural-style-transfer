services:
  style-transfer:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./results:/app/results
      - ./tasks:/app/tasks
      - ./mlruns:/app/mlruns # Монтируем директорию для MLflow
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    expose:
      - "8000" # Открываем порт для Prometheus

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Позволяет Docker достучаться до хоста
    depends_on:
      - style-transfer
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  mlflow:
    image: python:3.9-slim
    container_name: mlflow
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      sh -c "pip install mlflow && mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri file:///mlruns"
    restart: unless-stopped

volumes:
  grafana_data: